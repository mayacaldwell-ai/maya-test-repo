<!doctype html>
<html><head><meta charset=utf-8><title>Purchase Successful</title></head><body>
<h1>Thank you — check your email for the download link</h1>
<p>If you do not receive an email within a minute, paste your session id below to retrieve the download link:</p>
<input id=session placeholder='Checkout session id'> <button id=getLink>Get download link</button>
<div id=result></div>
<script>
async function getLink(){
  const sid=document.getElementById('session').value.trim();
  if(!sid) return alert('Enter session id');
  const resp=await fetch('/api/redeem-session',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid})});
  const j=await resp.json();
  if(j.url) document.getElementById('result').innerHTML = '<a href="'+j.url+'">Download your kit</a>'; else document.getElementById('result').textContent='No link found yet.';
}
document.getElementById('getLink').addEventListener('click', getLink);
</script>
</body></html>
